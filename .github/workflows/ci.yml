name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'  # ✅ CHANGED: npm → yarn

    - name: Install dependencies
      run: yarn install  # ✅ CHANGED: npm ci → yarn install

    - name: Run linting
      run: yarn lint  # ✅ CHANGED: npm → yarn

    - name: Build project
      run: yarn build  # ✅ CHANGED: npm → yarn

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run security audit
      run: yarn audit --level moderate  # ✅ CHANGED: npm audit → yarn audit
  
